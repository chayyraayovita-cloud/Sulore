<!-- ═══════════════════════════════════════════════
     GAMBAR 12 – KATALOG FOLKLOR (3 Cards)
═══════════════════════════════════════════════ -->
<section class="folklor-section">

  <h1 class="section-title" style="text-align:center; margin-bottom:44px;">
    KATALOG <span class="text-orange">FOLKLOR</span>
  </h1>

  <div class="folklor-grid">

    <!-- Card 1: Tragedi Kekeringan -->
    <div class="folklor-card">
      <div class="folklor-art">
        <img src="assets/images/folklor-kekeringan.png"
             alt="Ilustrasi Tragedi Kekeringan"
             style="max-width:160px;max-height:160px;object-fit:contain;filter:brightness(0) invert(1);">
      </div>
      <p class="folklor-card-title">Tragedi Kekeringan dan Munculnya Tapa Brata Kiperas</p>
      <a href="folklor-kekeringan.html" class="btn-orange" id="btn-baca-kekeringan">BACA SELENGKAPNYA</a>
    </div>

    <!-- Card 2: Kedatangan Adipati -->
    <div class="folklor-card">
      <div class="folklor-art">
        <img src="assets/images/folklor-adipati.png"
             alt="Ilustrasi Kedatangan Adipati Tuban"
             style="max-width:160px;max-height:160px;object-fit:contain;filter:brightness(0) invert(1);">
      </div>
      <p class="folklor-card-title">Kedatangan Adipati Tuban dan Sabda Ikan Bader</p>
      <a href="folklor-adipati.html" class="btn-orange" id="btn-baca-adipati">BACA SELENGKAPNYA</a>
    </div>

    <!-- Card 3: Penjaga Gaib -->
    <div class="folklor-card">
      <div class="folklor-art">
        <img src="assets/images/folklor-penjaga.png"
             alt="Ilustrasi Penjaga Ghaib Kyai Fosil"
             style="max-width:160px;max-height:160px;object-fit:contain;filter:brightness(0) invert(1);">
      </div>
      <p class="folklor-card-title">Penjaga Gaib Kyai Fosil dan Pasukan Codot</p>
      <a href="folklor-penjaga.html" class="btn-orange" id="btn-baca-penjaga">BACA SELENGKAPNYA</a>
    </div>

  </div>
